{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Finnish Vocabulary</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    min-height: 100vh;
}

body {
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;

    /* Use static folder image */
    background-image: url("{% static 'frontend/images/background_img.png' %}");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    animation: bgZoom 6s ease forwards;
}

/* overlay to keep buttons readable */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,53,128,0.55);
    z-index: -1;
}

/* background zoom animation */
@keyframes bgZoom {
    from {
        background-size: 110%;
        opacity: 0.8;
    }
    to {
        background-size: 100%;
        opacity: 1;
    }
}

/* title animation */
h1 {
    color: white;
    margin-bottom: 40px;
    font-weight: 600;
    letter-spacing: 1px;

    opacity: 0;
    transform: translateY(-30px);
    animation: fadeDown 1s ease forwards;
}

/* buttons */
.menu-button {
    display: block;
    width: 260px;
    padding: 15px;
    margin: 10px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 600;
    color: #003580;
    background: white;
    text-align: center;
    box-shadow: 0 6px 15px rgba(0,0,0,0.25);

    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 0.8s ease forwards;
}

/* hover effect */
.menu-button:hover {
    transform: translateY(-4px) scale(1.05);
    background: #f0f7ff;
}

/* animations */
@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
@keyframes fadeDown {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>
</head>

<body>

<h1>🇫🇮 Finnish Vocabulary</h1>

{% for item in options %}

    {% if item == "Add new words" %}
        <a href="{% url 'add_word' %}" 
           class="menu-button"
           style="animation-delay: {{ forloop.counter0 }}s;">
            {{ forloop.counter }}. {{ item }}
        </a>

    {% elif item == "Show all words" %}
        <a href="{% url 'show_words' %}" 
           class="menu-button"
           style="animation-delay: {{ forloop.counter0 }}s;">
            {{ forloop.counter }}. {{ item }}
        </a>

    {% else %}
        <a href="#" 
           class="menu-button"
           style="animation-delay: {{ forloop.counter0 }}s;">
            {{ forloop.counter }}. {{ item }}
        </a>

    {% endif %}

{% endfor %}

</body>
</html>
