{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Finnish Learning - Review Options</title>

    <style>
        /* ===== GLOBAL PAGE LAYOUT ===== */
        body {
            font-family: Arial, sans-serif;

            /* Fullscreen background image */
            background-image: url("{% static 'frontend/reviewoption.png' %}");
            background-size: cover;         
            background-position: center;      
            background-repeat: no-repeat;     
            
            /* Center content vertically and horizontally */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* ===== MAIN CONTAINER ===== */
        .review-container {
            background: rgba(255,255,255,0.95);  
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            text-align: center;
            width: 380px;
        }

        /* ===== HEADER  ===== */
        h2.title {
            margin-top: 0;
            margin-bottom: 10px;
            font-weight: 800;
            font-size: 1.8rem;
            background: linear-gradient(
                90deg, 
                #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8f00ff, #ff0000
            );
            background-size: 400% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbowFlow 5s linear infinite, slideDown 0.6s ease forwards;
        }

        /* Set indicator text */
        .set-indicator {
            font-size: 0.95rem;
            color: #555;
            margin-bottom: 25px;
            font-style: italic;
            opacity: 0;
            animation: slideDown 0.6s ease forwards;
            animation-delay: 0.1s;
        }

        @keyframes rainbowFlow {
            0% { background-position: 0% 0%; }
            100% { background-position: 400% 0%; }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(-10px); }
        }

        /* ===== BUTTON STYLE ===== */
        .btn-custom {
            background-color: #003380;
            color: white;
            padding: 18px;
            font-weight: bold;
            text-decoration: none;
            display: block;
            margin: 15px 0;
            border-radius: 8px;
            transition: all 0.25s ease;
            opacity: 0;
            animation: slideDown 0.6s ease forwards;
        }

        /* Delay each button so they appear one by one */
        .btn-custom:nth-child(3) { animation-delay: 0.3s; }
        .btn-custom:nth-child(4) { animation-delay: 0.5s; }

        /* Hover effect */
        .btn-custom:hover {
            background-color: #002255;
            transform: translateY(-3px);
            box-shadow: 0 6px 10px rgba(0,0,0,0.2);
        }

        /* ===== BACK BUTTON ===== */
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;

            text-decoration: none;
            color: #003580;
            font-weight: bold;
            font-size: 0.9rem;

            background: rgba(255, 255, 255, 0.9);
            padding: 8px 12px;
            border-radius: 8px;

            box-shadow: 0 4px 10px rgba(0,0,0,0.12);
            transition: 0.2s;
        }

        .back-link:hover {
            color: #00265a;
            text-decoration: underline;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <!-- Main UI container -->
    <div class="review-container">

        <!-- Page title -->
        <h2 class="title">Select Review Mode</h2>

        <!-- Navigation buttons -->
        <a href="{% url 'review_flashcards' %}" class="btn-custom">
            Flashcards Mode
        </a>

        <a href="{% url 'review_quiz' %}{% if set_name %}?set_name={{ set_name|urlencode }}{% endif %}" class="btn-custom">
            Multiple Choice Quiz
        </a>

        <!-- Return navigation -->
        <a href="{% url 'main_menu' %}" class="back-link">
            ← Back to Menu
        </a>

    </div>

</body>
</html>
