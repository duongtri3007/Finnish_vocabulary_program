<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Finnish Vocabulary List</title>

    {% load static %}

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px;
            background-image: url("{% static 'frontend/wordlist.png' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 10px;
            border: 3px solid black;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            color: #003580;
            text-align: center;
            border-bottom: 2px solid #003580;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            table-layout: fixed;
        }

        th, td {
            padding: 12px;
            text-align: center;          /* center text */
            border-bottom: 1px solid #ddd;
            border-right: 1px solid #ddd;
        }

        th {
            background-color: #003580;
            color: white;
        }

        th:last-child,
        td:last-child {
            border-right: none;
        }

        /* Make the # column narrow */
        th:first-child,
        td:first-child {
            width: 60px;
        }

        tr:hover {
            background-color: #f9f9f9;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #003580;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <a href="{% url 'main_menu' %}" class="back-btn">← Back to Menu</a>
    
    <h1>{% if set_title %}{{ set_title }}{% else %}Saved Vocabulary{% endif %}</h1>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Finnish</th>
                <th>English</th>
            </tr>
        </thead>
        <tbody>
            {% for item in vocabulary %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td><strong>{{ item.fi }}</strong></td>
                <td>{{ item.en }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" style="text-align: center; color: #888;">
                    No words found in this list.
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
