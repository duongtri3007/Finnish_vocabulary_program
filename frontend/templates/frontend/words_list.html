<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Finnish Vocabulary List</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 40px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #003580; text-align: center; border-bottom: 2px solid #003580; padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #003580; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        tr:hover { background-color: #f9f9f9; }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #003580;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="{% url 'main_menu' %}" class="back-btn">← Back to Menu</a>
        
        <h1>Your Finnish Vocabulary</h1>

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Finnish</th>
                    <th>English</th>
                </tr>
            </thead>
            <tbody>
                {% for finnish, english in vocabulary.items %}
                <tr>
                    <td>{{ forloop.counter }}</td>
                    <td><strong>{{ finnish }}</strong></td>
                    <td>{{ english }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>
</html>
