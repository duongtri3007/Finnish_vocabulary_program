<!DOCTYPE html>
<html>
<head>
    <title>Finnish Flashcard App</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        .card {
            width: 300px;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid black;
        }

        input {
            padding: 8px;
            margin-top: 10px;
            width: 80%;
        }

        button {
            margin-top: 10px;
            padding: 8px 12px;
        }
    </style>
</head>

<body>

<h1>Finnish Flashcard Vocabulary</h1>

<div class="card">

    <h2>Finnish word:</h2>
    <h3>koira</h3>

    <p>Type the English meaning:</p>

    <input type="text" placeholder="Your answer here">

    <br>

    <button>Check Answer</button>

    <p><strong>Correct meaning:</strong> dog</p>

    <br>

    <button>Next Flashcard</button>

</div>

</body>
</html>
