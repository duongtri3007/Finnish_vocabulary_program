<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Finnish Vocabulary</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f4; }
        .menu-container { margin-top: 50px; }
        .menu-button {
            display: block;
            width: 250px;
            margin: 10px auto;
            padding: 15px;
            background-color: #003580; /* Finnish Blue */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .menu-button:hover { background-color: #00255a; }
    </style>
</head>
<body>

    <h1>=== Finnish Vocabulary Program ===</h1>

    <div class="menu-container">
        {% for item in options %}
            {% if item == "Add new words" %}
                <a href="{% url 'add_word' %}" class="menu-button">
                    {{ forloop.counter }}. {{ item }}
                </a>
            {% elif item == "Show all words" %}
                <a href="{% url 'show_words' %}" class="menu-button">
                    {{ forloop.counter }}. {{ item }}
                </a>
            {% else %}
                <a href="#" class="menu-button">
                    {{ forloop.counter }}. {{ item }}
                </a>
            {% endif %}
        {% endfor %}
    </div>

</body>
</html>
