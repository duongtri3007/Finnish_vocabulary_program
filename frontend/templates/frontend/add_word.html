{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Add Finnish Word</title>
    <style>
        /* Body setup */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background-image: url("{% static 'frontend/addword_img.png' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .form-card { 
            background: rgba(255, 255, 255, 0.9);  /* semi-transparent */
            padding: 30px; 
            border-radius: 12px; 
            border: 2px solid black;  /* black border outside container */
            box-shadow: 0 6px 15px rgba(0,0,0,0.1); 
            width: 320px; 
            text-align: center;
        }

        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 2px solid black;  /* black border for inputs */
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 1rem;
        }

        button { 
            width: 100%; 
            padding: 12px; 
            margin-top: 10px;
            background: #003580; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover { 
            background: #00255a; 
        }

        .back { 
            display: inline-block; 
            margin-top: 15px; 
            padding: 10px 20px;
            background: #ccc; 
            color: black; 
            text-decoration: none; 
            border-radius: 6px; 
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .back:hover { 
            background: #aaa; 
        }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Add New Word</h2>

        {% if saved %}
            <p style="color: green; font-weight: bold;">Word saved successfully!</p>
        {% endif %}

        <form method="POST">
            {% csrf_token %} 
            <input type="text" name="finnish_word" placeholder="Finnish (e.g. Talo)" required>
            <input type="text" name="english_word" placeholder="English (e.g. House)" required>
            <button type="submit">Save to Vocabulary</button>
        </form>
        <a href="{% url 'main_menu' %}" class="back">Back</a>
    </div>
</body>
</html>
