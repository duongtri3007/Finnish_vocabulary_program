<!DOCTYPE html>
<html>
<head>
    <title>Add Finnish Word</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f4f4f4; }
        .form-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #003580; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #00255a; }
        .back { display: block; text-align: center; margin-top: 15px; color: #666; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Add New Word</h2>
        <form method="POST">
            {% csrf_token %} <input type="text" name="finnish_word" placeholder="Finnish (e.g. Talo)" required>
            <input type="text" name="english_word" placeholder="English (e.g. House)" required>
            <button type="submit">Save to Vocabulary</button>
        </form>
        <a href="{% url 'main_menu' %}" class="back">Cancel</a>
    </div>
</body>
</html>
